<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>FinalA - Interactive Soup Cans</title>

  <!-- 
    p5.js 主库。
    我们用它来画 canvas、图形、文字、鼠标和键盘交互。
  -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <!-- 
    p5.sound 库。
    因为组员代码里用了 p5.FFT() 和 p5.Amplitude()，
    所以必须加载这个，否则页面会报错。
  -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/addons/p5.sound.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }

    #sketch-holder {
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>
  <!-- 
    sketch.js 里面有 cnv.parent("sketch-holder")，
    所以这里必须有这个 div。
  -->
  <div id="sketch-holder"></div>

  <!-- 
    

    1. user-input-mechanic.js
       先加载 user input 状态函数，例如：
       setupUserInputStates()
       updateUserInputStates()
       getInputHover()
       drawUserInputLiquid()

    2. soup-can.js
       加载画罐头的函数。
       因为 soup-can.js 会调用 user-input-mechanic.js 里的函数。

    3. sketch.js
       最后加载主控制器。
       它负责 setup(), draw(), buildGrid() 等整体流程。
  -->
  <script src="user-input-mechanic.js"></script>
  <script src="soup-can.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
